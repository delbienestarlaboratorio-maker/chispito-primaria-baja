name: Deploy chispito-primaria-baja to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build with OpenNext
        run: npx @opennextjs/cloudflare build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_PLAN_V2_PRECIO: 9900
          NEXT_PUBLIC_PLAN_V3_PRECIO: 24900
          NEXT_PUBLIC_SITE_URL: https://chispito.mx
      - name: Assemble Edge Worker
        run: |
          cp .open-next/worker.js .open-next/assets/_worker.js
          cp -r .open-next/cloudflare .open-next/assets/cloudflare
          cp -r .open-next/middleware .open-next/assets/middleware
          cp -r .open-next/server-functions .open-next/assets/server-functions
          cp -r .open-next/.build .open-next/assets/.build
          cp -r .open-next/cache .open-next/assets/cache || true
          cp -r .open-next/dynamodb-provider .open-next/assets/dynamodb-provider || true
          echo '{"version":1,"include":["/*"],"exclude":["/_next/*","/favicon.ico","/robots.txt"]}' > .open-next/assets/_routes.json
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy .open-next/assets --project-name chispito-primaria-baja --branch main
